<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>SECOND SOURCE</title>

    <link
        rel="stylesheet"
        href="./construction.css?v=4"
    >
</head>

<body>

    <main class="landing-page">

        <video
            class="landing-video"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
        >
            <source
                src="./videos/sourcelogo_2.webm"
                type="video/webm"
            >

            <source
                src="./videos/ps2_loop.mp4"
                type="video/mp4"
            >
        </video>

    </main>


    <aside class="dream-access">

        <p class="dream-access-title">
            ENTER THE CURRENT DREAM.
        </p>

        <form
            id="dream-form"
            class="dream-form"
        >

            <input
                id="dream-password"
                class="dream-password"
                type="password"
                placeholder="PASSWORD"
                autocomplete="off"
                aria-label="Password"
            >

            <button
                class="dream-button"
                type="submit"
            >
                ENTER
            </button>

        </form>

        <p
            id="dream-error"
            class="dream-error"
            aria-live="polite"
        ></p>

    </aside>


    <script>
        const dreamForm =
            document.getElementById("dream-form");

        const passwordInput =
            document.getElementById("dream-password");

        const errorMessage =
            document.getElementById("dream-error");


        const correctPassword =
            "currentdream";


        dreamForm.addEventListener(
            "submit",
            function (event) {

                event.preventDefault();

                if (
                    passwordInput.value ===
                    correctPassword
                ) {

                    window.location.href =
                        "./index-full.html";

                } else {

                    errorMessage.textContent =
                        "ACCESS DENIED";

                    passwordInput.value =
                        "";

                    passwordInput.focus();

                }

            }
        );
    </script>

</body>
</html>
