<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>THE DREAM</title>

   <link rel="stylesheet" href="./construction.css?v=3">
</head>

<body>
    <main class="landing-page">

        <video
            class="landing-video"
            src="./videos/sourcelogo_2.webm"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
        ></video>

        <p class="construction-message">
            BUILDING THE DREAM.
        </p>

    </main>

    <aside class="dream-access">
        <p class="dream-access-title">
            ENTER THE CURRENT DREAM.
        </p>

        <form id="dream-form" class="dream-form">
            <input
                id="dream-password"
                class="dream-password"
                type="password"
                placeholder="PASSWORD"
                autocomplete="off"
                aria-label="Password"
            >

            <button class="dream-button" type="submit">
                ENTER
            </button>
        </form>

        <p id="dream-error" class="dream-error" aria-live="polite"></p>
    </aside>

    <script>
        const dreamForm = document.querySelector("#dream-form");
        const passwordInput = document.querySelector("#dream-password");
        const errorMessage = document.querySelector("#dream-error");

        const correctPassword = "currentdream";

        dreamForm.addEventListener("submit", function (event) {
            event.preventDefault();

            if (passwordInput.value === correctPassword) {
                window.location.href = "./index-full.html";
            } else {
                errorMessage.textContent = "ACCESS DENIED";
                passwordInput.value = "";
                passwordInput.focus();
            }
        });
    </script>
</body>
</html>
