<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>THE DREAM</title>

    <link rel="stylesheet" href="./style.css">
</head>

<body class="dream-page">

    <main class="dream-container">

        <video
            class="dream-video"
            autoplay
            loop
            muted
            playsinline
        >
            <source
                src="./videos/sourcelogo_2.webm"
                type="video/webm"
            >
        </video>


        <h1>THE DREAM</h1>

        <p class="dream-intro">
            You have been here before.
        </p>


        <!-- DREAM IMAGE -->

      <div class="dream-image-frame">

    <img
        class="dream-image"
        src="./images/ps2_dog_1.webp"
        alt="A dreamlike dog"
    >
</div>


        <!-- MENU -->

        <nav class="dream-menu">

            <a href="./game.html">
                ENTER THE GAME
            </a>

            <a href="#lost-places">
                LOST PLACES
            </a>

            <a href="#fragments">
                FRAGMENTS
            </a>

        </nav>


        <!-- LOST PLACES -->

        <section
            id="lost-places"
            class="dream-section"
        >

            <h2>LOST PLACES</h2>

            <p>
                A room you almost remember.
            </p>

            <p>
                The door was open last time.
            </p>

        </section>


        <!-- FRAGMENTS -->

        <section
            id="fragments"
            class="dream-section"
        >

            <h2>FRAGMENTS</h2>

            <p>
                Some things remain after waking.
            </p>

            <p>
                Some things do not.
            </p>

        </section>


        <!-- RETURN -->

        <p class="dream-return">

            <a href="./index.html">
                WAKE UP
            </a>

        </p>

    </main>

</body>

</html>
